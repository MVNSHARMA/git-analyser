version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: git_analyser_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gitanalyser
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev -d gitanalyser']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: git_analyser_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: git_analyser_backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: ts-node src/server.ts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: git_analyser_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  pgdata:
